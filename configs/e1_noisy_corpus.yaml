experiment_id: e1_noisy_corpus

data:
  dataset_name: squad
  dataset_split: validation
  max_questions_default: 300
  corpus_in: outputs/corpora/squad_chunks.jsonl
  corpus_out: outputs/corpora/squad_chunks_noisy.jsonl

chunking:
  max_chars: 900
  overlap_chars: 150

noise:
  seed: 42
  chunk_fraction: 1.0
  edits_per_100_chars: 2.5
  op_weights:
    keyboard_typo: 0.35
    swap_adjacent: 0.20
    delete_char: 0.15
    insert_char: 0.15
    random_replace: 0.15
  preserve_whitespace: true

retrieval:
  embed_model: BAAI/bge-base-en-v1.5
  index_out: outputs/indexes/e1_noisy.faiss
  meta_out: outputs/indexes/e1_noisy_meta.jsonl
  top_k: 5
  batch_size: 64

generation:
  model: google/flan-t5-base
  max_new_tokens: 32
  temperature: 0.0
  do_sample: false

eval:
  run_dir: outputs/runs/e1_noisy_corpus
  compute_retrieval_hit: true
  save_predictions: true
  seed: 42
